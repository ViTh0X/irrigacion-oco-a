{% extends "../layout_irrigacion_ocoña.html" %}
{% block titulo %}Socios{% endblock  %}
{% block contenido %}
<h1 class="no-margin">Informacion Huertos</h1>
<div class="contenedor_principal_informacion">
    <div class="opciones_principal">        
        <div class="botones_enlaces">
            <a href="{% url 'menu_bienes_inmueble_huertos'%}">                
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="50"
                height="50"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#047617"
                stroke-width="1.25"
                stroke-linecap="round"
                stroke-linejoin="round"
                >
                <path d="M5 21c.5 -4.5 2.5 -8 7 -10" />
                <path d="M9 18c6.218 0 10.5 -3.288 11 -12v-2h-4.014c-9 0 -11.986 4 -12 9c0 1 0 3 2 5h3z" />
                </svg>                 
            </a>                        
            <a href="{% url 'editar_huerto' pk=huerto.id %}">
                <svg
                xmlns="http://www.w3.org/2000/svg"
                width="50"
                height="50"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#01b21e"
                stroke-width="2.25"
                stroke-linecap="round"
                stroke-linejoin="round"
                >
                <path d="M4 20h4l10.5 -10.5a2.828 2.828 0 1 0 -4 -4l-10.5 10.5v4" />
                <path d="M13.5 6.5l4 4" />
                </svg>
            </a>
            <a href="{% url 'home_irrigacion_ocoña' %}">
                <svg
                xmlns="http://www.w3.org/2000/svg"
                width="50"
                height="50"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#d21919"
                stroke-width="2.25"
                stroke-linecap="round"
                stroke-linejoin="round"
                >
                <path d="M5 12l-2 0l9 -9l9 9l-2 0" />
                <path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7" />
                <path d="M10 12h4v4h-4z" />
                </svg>
            </a>
        </div>
    </div>   
    <div>
        <div class="data_label">
            <div class="informacion_labels">
                <label class="texto_negrita" for="">ID:</label>
                <label for="">{{ huerto.id }}</label>
            </div>
            <div class="informacion_labels">
                <label class="texto_negrita" for="">Nombre:</label>
                <label for="">{{ huerto.nombre }}</label>
            </div> 
            <div class="informacion_labels">
                <label class="texto_negrita" for="">Socio:</label>
                <label for="">{{ huerto.socio_relacionado.apellidos }}, {{ huerto.socio_relacionado.nombres }}</label>
            </div>            
            <div class="informacion_labels">
                <label class="texto_negrita" for="">Codigo Socio:</label>
                <label for="">{{ huerto.codigo_socio_asociado }}</label>
            </div>            
            <div class="informacion_labels"> 
                <label class="texto_negrita" for="">Personas Relacionadas:</label>
                <ul>
                    {% for persona in personas_relacionadas %}
                    <label for="" class="display_flex">°{{ persona }}</label>
                    {% empty %}
                    <label for="">No tiene personas Relacionadas</label>
                    {% endfor %}
                </ul>                
            </div>                        
        </div>        
        </div>
    </div>    
</div>
{% endblock  %}
