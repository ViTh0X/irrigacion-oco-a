{% extends "../layout_irrigacion_ocoña.html" %}
{% block titulo %}Socios{% endblock  %}
{% block contenido %}
<h1 class="no-margin">Informacion Parcelas</h1>
<div class="contenedor_principal_informacion">
    <div class="opciones_principal">        
        <div class="botones_enlaces">
            <a href="{% url 'menu_bienes_inmueble_parcelas'%}">                
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="50"
                height="50"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#047617"
                stroke-width="1.25"
                stroke-linecap="round"
                stroke-linejoin="round"
                >
                <path d="M5 21c.5 -4.5 2.5 -8 7 -10" />
                <path d="M7.5 15q -3.5 0 -4.5 -6a8.4 8.4 0 0 1 3.438 .402a12 12 0 0 1 -.052 -.793c0 -3.606 3.204 -5.609 3.204 -5.609s2.003 1.252 2.842 3.557q 2.568 -1.557 6.568 -1.557q .396 3.775 -1.557 6.568c2.305 .839 3.557 2.842 3.557 2.842s-3 2.59 -7 2.59c0 1 0 1 .5 3q -6 0 -7 -5" />
                </svg>                   
            </a>                        
            <a href="{% url 'editar_parcela' pk=parcela.id %}">
                <svg
                xmlns="http://www.w3.org/2000/svg"
                width="50"
                height="50"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#01b21e"
                stroke-width="2.25"
                stroke-linecap="round"
                stroke-linejoin="round"
                >
                <path d="M4 20h4l10.5 -10.5a2.828 2.828 0 1 0 -4 -4l-10.5 10.5v4" />
                <path d="M13.5 6.5l4 4" />
                </svg>
            </a>
            <a href="{% url 'home_irrigacion_ocoña' %}">
                <svg
                xmlns="http://www.w3.org/2000/svg"
                width="50"
                height="50"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#d21919"
                stroke-width="2.25"
                stroke-linecap="round"
                stroke-linejoin="round"
                >
                <path d="M5 12l-2 0l9 -9l9 9l-2 0" />
                <path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7" />
                <path d="M10 12h4v4h-4z" />
                </svg>
            </a>
        </div>
    </div>   
    <div>
        <div class="data_label">
            <div class="informacion_labels">
                <label class="texto_negrita" for="">ID:</label>
                <label for="">{{ parcela.id }}</label>
            </div> 
            <div class="informacion_labels">
                <label class="texto_negrita" for="">Nombre:</label>
                <label for="">{{ parcela.nombre }}</label>
            </div> 
            <div class="informacion_labels">
                <label class="texto_negrita" for="">Socio:</label>
                <label for="">{{ parcela.socio_relacionado.apellidos }}, {{ parcela.socio_relacionado.nombres }}</label>
            </div>            
            <div class="informacion_labels">
                <label class="texto_negrita" for="">Codigo Socio:</label>
                <label for="">{{ parcela.codigo_socio_asociado }}</label>
            </div>            
            <div class="informacion_labels"> 
                <label class="texto_negrita" for="">Personas Relacionadas:</label>
                <ul>
                    {% for persona in personas_relacionadas %}
                    <label for="" class="display_flex">°{{ persona }}</label>
                    {% empty %}
                    <label for="">No tiene personas Relacionadas</label>
                    {% endfor %}
                </ul>                
            </div>                        
        </div>        
        </div>
    </div>    
</div>
{% endblock  %}
